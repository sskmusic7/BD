<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="%PUBLIC_URL%/favicon-16x16.png" />
    <link rel="shortcut icon" type="image/png" href="%PUBLIC_URL%/favicon-32x32.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />

    <!-- Content Security Policy for Google OAuth -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval'
        https://accounts.google.com
        https://www.gstatic.com
        https://apis.google.com
        https://cdn.jsdelivr.net;
      script-src-elem 'self' 'unsafe-inline'
        https://accounts.google.com
        https://www.gstatic.com
        https://apis.google.com;
      connect-src 'self'
        http://localhost:*
        https://*.convex.cloud
        https://accounts.google.com
        https://oauth2.googleapis.com
        https://www.googleapis.com
        https://*.gstatic.com
        wss://localhost:* wss:;
      frame-src 'self'
        https://accounts.google.com
        https://accounts.google.com/gsi/;
      img-src 'self' data: https: blob:;
      style-src 'self' 'unsafe-inline' https:;
      font-src 'self' data: https:;
      media-src 'self' blob: data:;
    ">

    <meta
      name="description"
      content="BodyDouble - Find ADHD-friendly focus partners for virtual body doubling sessions"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>BodyDouble - ADHD Focus Partners</title>

    <!-- Google Identity Services (Required for OAuth) -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <!-- Google API (Optional, for additional Google services) -->
    <script src="https://apis.google.com/js/api.js"></script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
